name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run test

  release-windows:
    runs-on: windows-latest
    needs: validate
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cache electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~\AppData\Local\electron\cache
            ~\AppData\Local\electron-builder\cache
          key: electron-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Package
        shell: pwsh
        run: |
          if ("${{ secrets.CSC_LINK }}") {
            $env:CSC_LINK = "${{ secrets.CSC_LINK }}"
          }
          if ("${{ secrets.CSC_KEY_PASSWORD }}") {
            $env:CSC_KEY_PASSWORD = "${{ secrets.CSC_KEY_PASSWORD }}"
          }
          pnpm exec electron-builder --publish never
      - name: Generate checksums
        shell: pwsh
        run: |
          Get-ChildItem -Path release -Recurse -File -Include DAEMON-setup.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Out-File -Append -FilePath release/checksums-windows.txt
          }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            release/*/DAEMON-setup.exe
            release/*/latest.yml
            release/*/DAEMON-setup.exe.blockmap
            release/checksums-windows.txt
          retention-days: 1

  release-macos:
    runs-on: macos-latest
    needs: validate
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cache electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Package
        run: |
          if [ -n "${{ secrets.CSC_LINK }}" ]; then
            export CSC_LINK="${{ secrets.CSC_LINK }}"
          fi
          if [ -n "${{ secrets.CSC_KEY_PASSWORD }}" ]; then
            export CSC_KEY_PASSWORD="${{ secrets.CSC_KEY_PASSWORD }}"
          fi
          if [ -n "${{ secrets.APPLE_ID }}" ]; then
            export APPLE_ID="${{ secrets.APPLE_ID }}"
          fi
          if [ -n "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" ]; then
            export APPLE_APP_SPECIFIC_PASSWORD="${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
          fi
          if [ -n "${{ secrets.APPLE_TEAM_ID }}" ]; then
            export APPLE_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"
          fi
          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "Notarization secrets found, enabling notarize"
            npx json -I -f electron-builder.json -e 'this.mac.notarize=true'
          fi
          pnpm exec electron-builder --mac dmg zip --arm64 --x64 --publish never
      - name: Generate checksums
        run: |
          cd release
          find . -name "*.dmg" -o -name "*.zip" | while read f; do
            shasum -a 256 "$f" >> checksums-macos.txt
          done
      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            release/*/DAEMON-*.dmg
            release/*/DAEMON-*.zip
            release/*/latest-mac.yml
            release/*/DAEMON-*.blockmap
            release/checksums-macos.txt
          retention-days: 1

  release-linux:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cache electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm exec electron-builder --publish never
      - name: Generate checksums
        run: |
          cd release
          find . -name "*.AppImage" | while read f; do
            sha256sum "$f" >> checksums-linux.txt
          done
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            release/*/DAEMON.AppImage
            release/*/latest-linux.yml
            release/checksums-linux.txt
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs: [release-windows, release-macos, release-linux]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: windows-release
          path: artifacts/windows
      - uses: actions/download-artifact@v8
        with:
          name: macos-release
          path: artifacts/macos
      - uses: actions/download-artifact@v8
        with:
          name: linux-release
          path: artifacts/linux
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "## Changes" > changelog.md
          echo "" >> changelog.md
          git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD >> changelog.md
          echo "" >> changelog.md
          echo "" >> changelog.md
          echo "## Checksums" >> changelog.md
          echo '```' >> changelog.md
          cat artifacts/windows/checksums-windows.txt 2>/dev/null >> changelog.md || true
          cat artifacts/macos/checksums-macos.txt 2>/dev/null >> changelog.md || true
          cat artifacts/linux/checksums-linux.txt 2>/dev/null >> changelog.md || true
          echo '```' >> changelog.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
          files: |
            artifacts/windows/*/DAEMON-setup.exe
            artifacts/windows/*/latest.yml
            artifacts/windows/*/DAEMON-setup.exe.blockmap
            artifacts/macos/*/DAEMON-*.dmg
            artifacts/macos/*/DAEMON-*.zip
            artifacts/macos/*/latest-mac.yml
            artifacts/macos/*/DAEMON-*.blockmap
            artifacts/linux/*/DAEMON.AppImage
            artifacts/linux/*/latest-linux.yml
            artifacts/windows/checksums-windows.txt
            artifacts/macos/checksums-macos.txt
            artifacts/linux/checksums-linux.txt
