name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Linux UI test dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run test
      - name: Responsive UI smoke
        run: xvfb-run -a pnpm run test:responsive
      - name: Layout cohesion smoke
        run: xvfb-run -a pnpm run test:layout

  build-windows:
    name: build-windows
    runs-on: windows-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cache electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~\AppData\Local\electron\cache
            ~\AppData\Local\electron-builder\cache
          key: electron-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test:visual
      - run: pnpm run package

  build-macos:
    name: build-macos
    runs-on: macos-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cache electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run package
