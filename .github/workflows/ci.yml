name: CI

on:
  push:
    branches: [main, v4]
  pull_request:
    branches: [main, v4]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install Linux UI test dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb
      # Disable lifecycle scripts on install (Shai-Hulud-class supply-chain
      # defense); native modules and the Electron binary are set up explicitly.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run rebuild:native
      # --ignore-scripts skips electron's postinstall binary download; run only
      # electron's own install (not arbitrary lifecycle scripts) so tests that
      # import electron can load.
      - run: node node_modules/electron/install.js
      - name: OSV supply-chain scan (lockfile)
        uses: google/osv-scanner-action/osv-scanner-action@v2.0.2
        with:
          scan-args: |-
            --config=osv-scanner.toml
            --lockfile=pnpm-lock.yaml
      - run: pnpm run typecheck
      - run: pnpm run lint:styles
      - run: pnpm run security:audit
      - run: pnpm run test
      - name: Responsive UI smoke
        run: xvfb-run -a pnpm run test:responsive
      - name: Layout cohesion smoke
        run: xvfb-run -a pnpm run test:layout

  build-windows:
    name: build-windows
    runs-on: windows-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Cache electron
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~\AppData\Local\electron\cache
            ~\AppData\Local\electron-builder\cache
          key: electron-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run rebuild:native
      - run: node node_modules/electron/install.js
      - run: pnpm run build
      - run: pnpm run test:visual
      - run: pnpm exec electron-builder --publish never

  build-macos:
    name: build-macos
    runs-on: macos-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Cache electron
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run rebuild:native
      - run: node node_modules/electron/install.js
      - run: pnpm run build
      - name: Pre-cache Electron binary
        shell: bash
        run: |
          ELECTRON_VERSION="$(node -p "require('./package.json').devDependencies.electron.replace(/^[^0-9]*/, '')")"
          ELECTRON_CACHE="$HOME/.cache/electron"
          ELECTRON_ZIP="electron-v${ELECTRON_VERSION}-darwin-arm64.zip"
          mkdir -p "$ELECTRON_CACHE"
          curl --fail --location --retry 5 --retry-delay 10 --retry-all-errors \
            --output "$ELECTRON_CACHE/$ELECTRON_ZIP" \
            "https://github.com/electron/electron/releases/download/v${ELECTRON_VERSION}/${ELECTRON_ZIP}"
      - run: pnpm exec electron-builder --publish never
