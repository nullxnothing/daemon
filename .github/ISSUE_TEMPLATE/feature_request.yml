name: Feature Request
description: Suggest a feature for DAEMON
labels: [enhancement]
body:
  - type: dropdown
    id: pillar
    attributes:
      label: v3 pillar
      description: If this moves DAEMON toward v3, which pillar does it primarily advance?
      options:
        - Project scaffolding
        - Unified transaction pipeline
        - Solana activity timeline
        - Agent-aware runtime execution
        - Outside current v3 scope
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the user-facing behavior, not just the implementation.
    validations:
      required: true
  - type: textarea
    id: user_loop
    attributes:
      label: User loop
      description: What end-to-end builder loop gets easier after this ships?
      placeholder: "Create project -> run validator -> execute transaction -> debug failure"
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this to count as shipped?
      placeholder: |
        - Users can ...
        - DAEMON shows ...
        - Failure state is ...
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How should this be verified?
      placeholder: |
        - unit/dom tests
        - smoke flow
        - screenshots
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about.
